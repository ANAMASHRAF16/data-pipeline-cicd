name: CI

# Runs on every push to any branch and every pull request targeting main.
# A green run is the gate for merging - branch protection should require it.

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=85

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

      - name: Summarise results
        if: always()
        run: |
          echo "### Test results" >> $GITHUB_STEP_SUMMARY
          echo "Pipeline tests + ruff lint completed for commit ${GITHUB_SHA::8}." >> $GITHUB_STEP_SUMMARY
          echo "Coverage threshold: 85% (enforced via --cov-fail-under)." >> $GITHUB_STEP_SUMMARY
