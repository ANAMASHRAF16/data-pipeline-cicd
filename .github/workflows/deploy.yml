name: Deploy to Staging

# Runs ONLY on merges to main. Tests have already passed on the source PR
# (CI workflow is the merge gate), so this workflow's job is to package and
# ship the artifact - not to re-run the entire test matrix.
#
# Required GitHub repository secrets:
#   AWS_ACCESS_KEY_ID        - IAM user with s3:PutObject on the staging bucket
#   AWS_SECRET_ACCESS_KEY    - companion secret
#   STAGING_BUCKET           - e.g. data-pipeline-staging-871728574007
# Optional:
#   AWS_REGION               - defaults to us-east-1

on:
  push:
    branches: [main]

# Cancel any in-flight deploy from a previous push - only the latest commit
# should reach staging.
concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  smoke-test:
    name: Smoke test on main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Re-run pipeline tests
        # Belt-and-braces: the merging commit on main may differ from the PR
        # commit if a force-push happened mid-merge. Re-running here costs
        # 20 seconds and is cheap insurance against shipping untested code.
        run: pytest tests/ -v

  build-and-deploy:
    name: Build artifact and deploy to staging
    runs-on: ubuntu-latest
    needs: smoke-test
    # The `environment` block surfaces this run under the repo's Environments
    # tab. We omit `url:` because GitHub evaluates that field at workflow-parse
    # time, before secrets are resolved - so ${{ secrets.STAGING_BUCKET }} is
    # rejected with "Unrecognized named-value: 'secrets'". The actual staging
    # artifact URL is written to the deployment summary at the end of the job.
    environment:
      name: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build deployable artifact
        id: build
        run: |
          mkdir -p dist
          ARTIFACT="dist/data-pipeline-${GITHUB_SHA::8}.zip"
          zip -r "$ARTIFACT" src/ requirements.txt README.md
          echo "artifact_path=$ARTIFACT" >> $GITHUB_OUTPUT
          echo "artifact_name=$(basename "$ARTIFACT")" >> $GITHUB_OUTPUT
          ls -lh "$ARTIFACT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Verify staging bucket secret is set
        run: |
          if [ -z "${{ secrets.STAGING_BUCKET }}" ]; then
            echo "::error::STAGING_BUCKET secret is not configured."
            exit 1
          fi
          echo "Deploying to s3://${{ secrets.STAGING_BUCKET }}/"

      - name: Upload artifact to S3 staging bucket
        run: |
          aws s3 cp "${{ steps.build.outputs.artifact_path }}" \
            "s3://${{ secrets.STAGING_BUCKET }}/${{ steps.build.outputs.artifact_name }}" \
            --metadata "git-sha=${GITHUB_SHA},git-ref=${GITHUB_REF},deployed-at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Update "latest" pointer
        run: |
          aws s3 cp "${{ steps.build.outputs.artifact_path }}" \
            "s3://${{ secrets.STAGING_BUCKET }}/data-pipeline-latest.zip"

      - name: Write deployment summary
        run: |
          {
            echo "### Staging deployment"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Commit | \`${GITHUB_SHA::8}\` |"
            echo "| Branch | \`${GITHUB_REF#refs/heads/}\` |"
            echo "| Artifact | \`${{ steps.build.outputs.artifact_name }}\` |"
            echo "| Bucket | \`${{ secrets.STAGING_BUCKET }}\` |"
            echo "| Deployed at | \`$(date -u +%Y-%m-%dT%H:%M:%SZ)\` |"
          } >> $GITHUB_STEP_SUMMARY
